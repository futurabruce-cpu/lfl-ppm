<!-- v1 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LFL Fire PPM" />
  <title>LFL Fire PPM</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #F5A800; --dark: #ffffff; --mid: #f0f0f0; --card: #FFF8E7;
      --border: #000000; --text: #111111; --muted: #555555;
      --green: #16a34a; --blue: #1d4ed8; --amber: #F5A800;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; font-weight: 600; }
    .header { background: #F5A800; padding: 16px 20px 14px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #000; }
    .header h1 { font-size: 28px; font-weight: 900; color: #000000; letter-spacing: 0.5px; }
    .header-sub { font-size: 12px; color: rgba(0,0,0,0.65); margin-top: 2px; }
    .progress-wrap { padding: 12px 20px 0; }
    .progress-bar-bg { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar-fill { background: #F5A800; height: 100%; border-radius: 99px; transition: width 0.4s ease; }
    .progress-label { font-size: 12px; color: var(--muted); margin-top: 6px; text-align: right; }
    .main { flex: 1; padding: 24px 20px 100px; display: flex; flex-direction: column; gap: 16px; }
    .nav-row { display: flex; gap: 10px; padding: 10px 20px 0; }
    .nav-btn { flex: 1; padding: 11px 8px; border-radius: 10px; border: 2px solid var(--border); background: #f3f3f3; color: var(--text); font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; }
    .nav-btn:active { background: #e5e5e5; }
    .nav-btn.all-q { border-color: #F5A800; color: #333; background: #FFF8E7; }
    #all-q-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; }
    #all-q-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; max-height: 80vh; overflow-y: auto; padding: 0 0 40px; }
    .all-q-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #fff; z-index: 1; }
    .all-q-header h3 { font-size: 16px; font-weight: 800; }
    .all-q-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); line-height: 1; }
    .all-q-item { display: flex; align-items: center; gap: 10px; padding: 13px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .all-q-item:active { background: #f8f8f8; }
    .all-q-num { font-size: 12px; font-weight: 800; color: var(--muted); min-width: 24px; }
    .all-q-text { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
    .all-q-tick { font-size: 16px; margin-left: 6px; }
    .all-q-item.current-q { background: #FFF8E7; border-left: 3px solid #F5A800; }
    #site-screen { display: flex; flex-direction: column; }
    .site-card { background: #f3f3f3; border: 1px solid var(--border); border-radius: 16px; padding: 22px 18px 18px; margin: 24px 20px 0; display: flex; flex-direction: column; gap: 14px; }
    .site-card h2 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .site-card p { color: var(--muted); font-size: 14px; font-weight: 600; }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-group label { font-size: 17px; font-weight: 800; color: #111111; text-transform: uppercase; letter-spacing: 0.4px; }
    .draft-bar { background: #f3f3f3; border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; color: var(--muted); margin: 12px 20px 0; font-weight: 600; }
    .draft-bar button { background: #F5A800; border: 1px solid #000; border-radius: 8px; color: #000; font-size: 13px; font-weight: 600; padding: 7px 14px; cursor: pointer; }
    .logo-upload-btn { background: #f3f3f3; border: 2px dashed var(--border); border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; color: var(--muted); font-size: 15px; font-weight: 700; }
    .q-card { background: #FFF8E7; border: 2px solid #000; border-radius: 16px; padding: 22px 18px 18px; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .q-label { font-size: 13px; font-weight: 800; color: #000; background: #F5A800; display: inline-block; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
    .q-text { font-size: 20px; line-height: 1.45; color: var(--text); margin-bottom: 22px; font-weight: 700; }
    .yn-row { display: grid; gap: 12px; }
    .yn-row.two { grid-template-columns: 1fr 1fr; }
    .yn-row.three { grid-template-columns: 1fr 1fr 1fr; }
    .yn-btn { padding: 16px 8px; border-radius: 12px; border: none; color: #ffffff; font-size: 17px; font-weight: 800; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .yn-btn:active { transform: scale(0.97); }
    .yn-btn.yes { background: var(--green); }
    .yn-btn.no { background: #dc2626; }
    .yn-btn.na { background: #6b7280; }
    .choice-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .choice-btn { flex: 1; min-width: 60px; padding: 16px 8px; border-radius: 12px; border: 2px solid var(--border); background: #ffffff; color: var(--text); font-size: 17px; font-weight: 800; cursor: pointer; transition: all 0.15s; text-align: center; }
    .choice-btn.selected { background: var(--blue); border-color: var(--blue); color: #fff; }
    .field-input { width: 100%; background: #f3f3f3; border: 2px solid var(--border); border-radius: 12px; color: var(--text); font-size: 17px; padding: 14px 16px; outline: none; resize: none; transition: border-color 0.15s; font-family: inherit; font-weight: 600; }
    .field-input:focus { border-color: #F5A800; border-width: 2px; }
    .field-input::placeholder { color: var(--muted); font-weight: 500; }
    input[type="date"].field-input { color-scheme: light; }
    .photo-area { display: flex; flex-direction: column; gap: 12px; }
    .photo-btn { background: #f3f3f3; border: 2px dashed var(--border); border-radius: 12px; color: var(--muted); font-size: 15px; padding: 18px; cursor: pointer; text-align: center; font-weight: 700; }
    .photo-previews { display: flex; flex-wrap: wrap; gap: 8px; }
    .photo-thumb { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; border: 2px solid var(--border); }
    #photo-input { display: none; }
    .sig-wrap { border: 2px solid var(--border); border-radius: 12px; overflow: hidden; background: #fff; }
    .sig-canvas { display: block; width: 100%; touch-action: none; cursor: crosshair; }
    .sig-actions { display: flex; gap: 10px; margin-top: 10px; }
    .sig-clear { background: #f3f3f3; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-weight: 700; }
    .next-btn { width: 100%; padding: 18px; background: #F5A800; border: 2px solid #000; border-radius: 14px; color: #000; font-size: 17px; font-weight: 700; cursor: pointer; }
    .skip-btn { background: transparent; border: none; color: var(--muted); font-size: 14px; cursor: pointer; text-align: center; padding: 6px; text-decoration: underline; width: 100%; display: block; }
    .save-draft-btn { background: #f3f3f3; border: 1px solid var(--border); color: var(--muted); font-size: 14px; cursor: pointer; text-align: center; padding: 10px; border-radius: 10px; width: 100%; display: block; font-weight: 700; }
    #summary-screen { display: none; flex-direction: column; gap: 14px; padding: 24px 20px 40px; }
    .summary-header { text-align: center; padding: 20px 0 10px; }
    .summary-header .tick { font-size: 56px; }
    .summary-header h2 { font-size: 22px; font-weight: 700; margin-top: 10px; }
    .summary-header p { color: var(--muted); margin-top: 6px; font-size: 14px; }
    .summary-item { background: #f3f3f3; border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
    .summary-item .s-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; font-weight: 700; }
    .summary-item .s-value { font-size: 15px; word-break: break-word; font-weight: 600; }
    .export-btn { width: 100%; padding: 18px; background: #F5A800; border: 2px solid #000; border-radius: 14px; color: #000; font-size: 17px; font-weight: 700; cursor: pointer; }
    .email-btn { width: 100%; padding: 18px; background: var(--blue); border: none; border-radius: 14px; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; }
    .restart-btn { width: 100%; padding: 16px; background: transparent; border: 2px solid var(--border); border-radius: 14px; color: var(--text); font-size: 16px; font-weight: 600; cursor: pointer; }
    .section-divider { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 4px 0 2px; border-bottom: 1px solid var(--border); }
    .calc-result { background: #f0fdf4; border: 2px solid #16a34a; border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 800; color: #15803d; display: none; }
    .calc-field-label { font-size: 13px; font-weight: 700; color: #555; margin-bottom: 4px; }
  </style>
</head>
<body>

<!-- SITE DETAILS SCREEN -->
<div id="site-screen">
  <div class="header">
    <div>
      <h1>LFL Fire PPM</h1>
      <div class="header-sub">Ladrillos Facilities Ltd — Site Details</div>
    </div>
  </div>

  <div id="draft-bar-wrap" style="display:none;">
    <div class="draft-bar">
      <span>📋 Draft saved — resume where you left off?</span>
      <button onclick="loadDraft()">Resume</button>
    </div>
  </div>

  <div class="site-card">
    <div>
      <h2>Before you start</h2>
      <p>Enter the site details for this service visit.</p>
    </div>
    <div class="field-group">
      <label>Location Ref</label>
      <input class="field-input" id="sd-locref" type="text" placeholder="e.g. LOC-001" />
    </div>
    <div class="field-group">
      <label>Property Name</label>
      <input class="field-input" id="sd-property" type="text" placeholder="e.g. Crown House" />
    </div>
    <div class="field-group">
      <label>Address</label>
      <textarea class="field-input" id="sd-address" rows="3" placeholder="Full address including postcode"></textarea>
    </div>
    <div class="field-group">
      <label>Engineer Name</label>
      <input class="field-input" id="sd-engineer" type="text" placeholder="Your name" />
    </div>
    <div class="field-group">
      <label>Certificate No</label>
      <input class="field-input" id="sd-certno" type="text" placeholder="e.g. LFL-2026-001" />
    </div>
    <div class="field-group">
      <label>Service Date</label>
      <input class="field-input" id="sd-date" type="date" />
    </div>
    <div class="field-group">
      <label>Type of Service</label>
      <div class="choice-row" id="service-type-row">
        <button class="choice-btn" onclick="selectServiceType(this, 'Q')">Q — Quarterly</button>
        <button class="choice-btn" onclick="selectServiceType(this, 'B/A')">B/A — Bi-Annual</button>
        <button class="choice-btn" onclick="selectServiceType(this, 'A')">A — Annual</button>
      </div>
    </div>
  </div>
  <div style="padding: 16px 20px 40px;">
    <button class="next-btn" onclick="startService()">Start Service →</button>
  </div>
</div>

<!-- MAIN QUESTION SCREEN -->
<div id="app-screen" style="display:none; flex-direction:column; flex:1;">
  <div class="header">
    <div>
      <h1>LFL Fire PPM</h1>
      <div class="header-sub" id="header-site-name">Checklist</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">1 of 20</div>
  </div>
  <div class="nav-row">
    <button class="nav-btn" onclick="goBack()">← Previous</button>
    <button class="nav-btn all-q" onclick="openAllQuestions()">☰ All Questions</button>
  </div>
  <div class="main" id="main-area"></div>
</div>

<!-- ALL QUESTIONS OVERLAY -->
<div id="all-q-overlay" onclick="closeOverlayBg(event)">
  <div id="all-q-sheet">
    <div class="all-q-header">
      <h3>All Questions</h3>
      <button class="all-q-close" onclick="closeOverlay()">✕</button>
    </div>
    <div id="all-q-list"></div>
  </div>
</div>

<!-- SUMMARY SCREEN -->
<div id="summary-screen"></div>

<input type="file" id="photo-input" accept="image/*" multiple />

<script>
const { jsPDF } = window.jspdf;
const DRAFT_KEY = 'LFL_PPM_draft';

// ── Questions from LFL certificate template ───────────────────────────────────
const QUESTIONS = [
  // General System Information
  { id: 1,  label: "Manufacturer",               text: "What is the manufacturer of the fire alarm system?",             type: "text" },
  { id: 2,  label: "Model",                       text: "What is the model of the fire alarm system?",                    type: "text" },
  { id: 3,  label: "Type of System",              text: "What is the type of system?",                                    type: "text", placeholder: "e.g. Conventional, Addressable" },
  { id: 4,  label: "Location",                    text: "Where is the control panel located?",                            type: "text" },
  { id: 5,  label: "Battery Load Test",           text: "Has the battery load test been carried out?",                    type: "yn" },
  { id: 6,  label: "Charging Voltage",            text: "Record the charging voltage (V).",                               type: "number", placeholder: "e.g. 27.4" },
  { id: 7,  label: "MCP Manual Call Point",       text: "Have all manual call points been checked?",                      type: "yn" },
  { id: 8,  label: "Panel Controls",              text: "Have all panel controls been checked and confirmed operational?", type: "yn" },
  { id: 9,  label: "Heat Detector",               text: "Have all heat detectors been tested?",                           type: "yn" },
  { id: 10, label: "Circuit Monitoring",          text: "Has circuit monitoring been checked and confirmed operational?",  type: "yn" },
  { id: 11, label: "Multi Sensor",                text: "Have all multi sensor detectors been tested?",                   type: "yn" },
  { id: 12, label: "Relays & Shutdowns",          text: "Have all relays and shutdowns been tested?",                     type: "yn" },
  { id: 13, label: "Optical Detector",            text: "Have all optical detectors been tested?",                        type: "yn" },
  { id: 14, label: "Audibility Test / Visual",    text: "Has the audibility test and visual devices check been completed?", type: "yn" },
  { id: 15, label: "Indicator Lights & Fault",    text: "Have all indicator lights and the fault buzzer been checked?",   type: "yn" },
  { id: 16, label: "Linked to Other Premises",    text: "Is the system linked to other premises? If so, has this been checked?", type: "yna" },
  { id: 17, label: "Batteries",                   text: "Record the battery details (quantity, voltage, Ah).",            type: "text", placeholder: "e.g. 2x 12V 7Ah" },
  { id: 18, label: "Battery Calculation",         text: "Enter the battery values to calculate minimum battery capacity (Cmin).", type: "battery_calc" },

  // Monitoring
  { id: 19, label: "ARC Monitoring",              text: "Is the system monitored via an Intruder Alarm Central Station?", type: "yn" },
  { id: 20, label: "Central Station Number",      text: "What is the Central Station telephone number?",                  type: "text", placeholder: "e.g. 01234 567890" },
  { id: 21, label: "ARC Contacted",               text: "Has the Central Station been contacted by the engineer upon completion of testing to restore monitoring?", type: "yna" },
  { id: 22, label: "Testing Explained",           text: "Has the fire alarm testing operation been explained to the signatory?", type: "yn" },

  // Sign-off
  { id: 23, label: "Photo – Fire Panel",          text: "Take a photo of the fire panel on completion.",                  type: "photo" },
  { id: 24, label: "Additional Notes",            text: "Any additional notes or observations for this service visit?",   type: "text" },
  { id: 27, label: "Comments / Recommendations",  text: "Add any comments, recommendations or observations (these will appear on the Comments Sheet — up to 25 entries).", type: "comments_sheet" },
  { id: 25, label: "Engineer Signature",          text: "Please sign below to confirm this service has been completed.",  type: "signature", sigKey: "engineer" },
  { id: 26, label: "Customer Signature",          text: "Customer name and signature to confirm the service visit.",      type: "customer_sig" },
];

let currentIndex = 0;
let answers = {};
let siteDetails = {};
let photoInputTarget = null;
let sigDrawing = false;
let sigContexts = {};
let selectedServiceType = '';

function selectServiceType(btn, val) {
  document.querySelectorAll('#service-type-row .choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedServiceType = val;
}

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('sd-date').value = new Date().toISOString().split('T')[0];
  if (localStorage.getItem(DRAFT_KEY)) {
    document.getElementById('draft-bar-wrap').style.display = 'block';
  }
});

function saveDraft() {
  localStorage.setItem(DRAFT_KEY, JSON.stringify({ siteDetails, answers, currentIndex, selectedServiceType }));
  alert('Draft saved! You can close the app and resume later.');
}

function clearDraft() { localStorage.removeItem(DRAFT_KEY); }

function loadDraft() {
  const raw = localStorage.getItem(DRAFT_KEY);
  if (!raw) return;
  try {
    const draft = JSON.parse(raw);
    siteDetails = draft.siteDetails || {};
    answers = draft.answers || {};
    currentIndex = draft.currentIndex || 0;
    selectedServiceType = draft.selectedServiceType || '';
    document.getElementById('draft-bar-wrap').style.display = 'none';
    document.getElementById('site-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    if (siteDetails.property) document.getElementById('header-site-name').textContent = siteDetails.property;
    renderQuestion();
  } catch(e) { alert('Could not load draft.'); }
}

function startService() {
  siteDetails = {
    locRef:   document.getElementById('sd-locref').value.trim(),
    property: document.getElementById('sd-property').value.trim(),
    address:  document.getElementById('sd-address').value.trim(),
    engineer: document.getElementById('sd-engineer').value.trim(),
    certNo:   document.getElementById('sd-certno').value.trim(),
    date:     document.getElementById('sd-date').value || new Date().toISOString().split('T')[0],
    serviceType: selectedServiceType,
  };
  clearDraft();
  document.getElementById('site-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  if (siteDetails.property) document.getElementById('header-site-name').textContent = siteDetails.property;
  renderQuestion();
}

function updateProgress() {
  const pct = (currentIndex / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${currentIndex + 1} of ${QUESTIONS.length}`;
}

function goBack() {
  if (currentIndex === 0) return;
  currentIndex--;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openAllQuestions() {
  const list = document.getElementById('all-q-list');
  list.innerHTML = '';
  QUESTIONS.forEach((q, idx) => {
    const item = document.createElement('div');
    item.className = 'all-q-item' + (idx === currentIndex ? ' current-q' : '');
    const num = document.createElement('div'); num.className = 'all-q-num'; num.textContent = idx + 1;
    const text = document.createElement('div'); text.className = 'all-q-text'; text.textContent = q.label;
    const val = q.type === 'signature' ? answers['sig_engineer'] : q.type === 'customer_sig' ? answers['sig_customer'] : answers[q.id];
    const tick = document.createElement('div'); tick.className = 'all-q-tick';
    tick.textContent = (val !== undefined && val !== null && val !== '') ? '✅' : '○';
    item.appendChild(num); item.appendChild(text); item.appendChild(tick);
    item.onclick = () => { currentIndex = idx; closeOverlay(); renderQuestion(); window.scrollTo({ top: 0 }); };
    list.appendChild(item);
  });
  document.getElementById('all-q-overlay').style.display = 'block';
  setTimeout(() => { const cur = list.querySelector('.current-q'); if (cur) cur.scrollIntoView({ block: 'center' }); }, 50);
}

function closeOverlay() { document.getElementById('all-q-overlay').style.display = 'none'; }
function closeOverlayBg(e) { if (e.target === document.getElementById('all-q-overlay')) closeOverlay(); }

function renderQuestion() {
  if (currentIndex >= QUESTIONS.length) { showSummary(); return; }
  updateProgress();
  const q = QUESTIONS[currentIndex];
  const mainArea = document.getElementById('main-area');
  mainArea.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'q-card';
  card.innerHTML = `<div class="q-label">Question ${currentIndex + 1} of ${QUESTIONS.length} — ${q.label}</div>
                    <div class="q-text">${q.text.replace(/\n/g,'<br>')}</div>`;
  mainArea.appendChild(card);

  let inputEl = null;

  if (q.type === 'yn' || q.type === 'yna') {
    const hasNA = q.type === 'yna';
    const row = document.createElement('div');
    row.className = 'yn-row ' + (hasNA ? 'three' : 'two');
    const yBtn = makeBtn('yn-btn yes', '✓ Yes');
    const nBtn = makeBtn('yn-btn no', '✗ No');
    row.appendChild(yBtn); row.appendChild(nBtn);
    let naBtn = null;
    if (hasNA) { naBtn = makeBtn('yn-btn na', 'N/A'); row.appendChild(naBtn); }
    card.appendChild(row);
    if (answers[q.id] === 'Yes') yBtn.classList.add('selected');
    if (answers[q.id] === 'No')  nBtn.classList.add('selected');
    if (naBtn && answers[q.id] === 'N/A') naBtn.classList.add('selected');

    const selectAndAdvance = (val, btn, ...others) => {
      btn.classList.add('selected');
      others.forEach(b => b && b.classList.remove('selected'));
      answers[q.id] = val;
      // Q19 ARC: if No, skip Q20 and Q21
      if (q.id === 19 && val === 'No') {
        answers[20] = 'N/A'; answers[21] = 'N/A';
        currentIndex = QUESTIONS.findIndex(q => q.id === 22);
        if (currentIndex < 0) currentIndex = QUESTIONS.length;
        setTimeout(() => { currentIndex >= QUESTIONS.length ? showSummary() : renderQuestion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }, 300);
        return;
      }
      setTimeout(() => next(), 300);
    };
    yBtn.onclick = () => selectAndAdvance('Yes', yBtn, nBtn, naBtn);
    nBtn.onclick = () => selectAndAdvance('No', nBtn, yBtn, naBtn);
    if (naBtn) naBtn.onclick = () => selectAndAdvance('N/A', naBtn, yBtn, nBtn);

  } else if (q.type === 'battery_calc') {
    const saved = answers[q.id] ? JSON.parse(answers[q.id]) : {};
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:14px;';
    const fields = [
      { key: 'I1', label: 'I1 — Normal current draw (A)', placeholder: 'e.g. 0.35' },
      { key: 'T1', label: 'T1 — Standby time (hours)', placeholder: 'e.g. 24' },
      { key: 'I2', label: 'I2 — Alarm current draw (A)', placeholder: 'e.g. 1.2' },
    ];
    const inputs = {};
    const resultBox = document.createElement('div'); resultBox.className = 'calc-result';

    function calcCmin() {
      const I1 = parseFloat(inputs.I1.value), T1 = parseFloat(inputs.T1.value), I2 = parseFloat(inputs.I2.value);
      if (!isNaN(I1) && !isNaN(T1) && !isNaN(I2)) {
        const cmin = ((I1 * T1) + I2) * 1.25;
        resultBox.style.display = 'block';
        resultBox.textContent = `Cmin = [(${I1}×${T1})+${I2}] × 1.25 = ${cmin.toFixed(2)} Ah`;
        answers[q.id] = JSON.stringify({ I1, T1, I2, Cmin: cmin.toFixed(2) });
      } else { resultBox.style.display = 'none'; }
    }

    fields.forEach(({ key, label, placeholder }) => {
      const lbl = document.createElement('div'); lbl.className = 'calc-field-label'; lbl.textContent = label;
      const inp = document.createElement('input'); inp.type = 'number'; inp.className = 'field-input';
      inp.placeholder = placeholder; inp.inputMode = 'decimal'; inp.step = 'any';
      if (saved[key] !== undefined) inp.value = saved[key];
      inp.oninput = calcCmin; inputs[key] = inp;
      const fw = document.createElement('div'); fw.appendChild(lbl); fw.appendChild(inp);
      wrap.appendChild(fw);
    });
    wrap.appendChild(resultBox);
    if (saved.I1 !== undefined) calcCmin();
    card.appendChild(wrap);
    inputEl = null;

  } else if (q.type === 'comments_sheet') {
    const saved = answers[q.id] ? JSON.parse(answers[q.id]) : [''];
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:10px;';
    const rows = [];

    function addRow(val) {
      const idx = rows.length;
      const rowWrap = document.createElement('div');
      rowWrap.style.cssText = 'display:flex;align-items:flex-start;gap:8px;';
      const num = document.createElement('div');
      num.style.cssText = 'min-width:24px;padding-top:14px;font-size:13px;font-weight:800;color:#888;';
      num.textContent = idx + 1 + '.';
      const ta = document.createElement('textarea');
      ta.className = 'field-input'; ta.rows = 2; ta.placeholder = 'Enter comment…';
      ta.style.flex = '1';
      if (val) ta.value = val;
      ta.oninput = () => { rows[idx] = ta.value; saveComments(); };
      rows.push(val || '');
      rowWrap.appendChild(num); rowWrap.appendChild(ta);
      wrap.insertBefore(rowWrap, addBtn);
    }

    function saveComments() {
      answers[q.id] = JSON.stringify(rows.filter(r => r.trim()));
    }

    const addBtn = document.createElement('button');
    addBtn.className = 'choice-btn';
    addBtn.style.cssText = 'margin-top:4px;background:#FFF8E7;border:2px dashed #F5A800;color:#333;font-size:14px;';
    addBtn.textContent = '+ Add another comment';
    addBtn.onclick = (e) => { e.preventDefault(); if (rows.length < 25) addRow(''); };
    wrap.appendChild(addBtn);

    // Restore saved rows
    const initRows = answers[q.id] ? JSON.parse(answers[q.id]) : [];
    if (initRows.length === 0) { addRow(''); } else { initRows.forEach(r => addRow(r)); }

    card.appendChild(wrap);
    inputEl = null;

  } else if (q.type === 'text') {
    const ta = document.createElement('textarea');
    ta.className = 'field-input'; ta.rows = 4; ta.placeholder = q.placeholder || 'Type your answer…';
    if (answers[q.id]) ta.value = answers[q.id];
    card.appendChild(ta); inputEl = ta;

  } else if (q.type === 'number') {
    const inp = document.createElement('input');
    inp.type = 'number'; inp.className = 'field-input';
    inp.placeholder = q.placeholder || 'Enter value…'; inp.inputMode = 'decimal';
    if (answers[q.id]) inp.value = answers[q.id];
    card.appendChild(inp); inputEl = inp;

  } else if (q.type === 'photo') {
    const area = document.createElement('div'); area.className = 'photo-area';
    const btn = document.createElement('div'); btn.className = 'photo-btn';
    btn.innerHTML = '📷 Tap to take / choose photo';
    btn.onclick = () => { photoInputTarget = q.id; document.getElementById('photo-input').click(); };
    area.appendChild(btn);
    const previews = document.createElement('div'); previews.className = 'photo-previews'; previews.id = 'photo-previews-' + q.id;
    area.appendChild(previews); card.appendChild(area);
    if (answers[q.id]) answers[q.id].forEach(src => { const img = document.createElement('img'); img.src = src; img.className = 'photo-thumb'; previews.appendChild(img); });

  } else if (q.type === 'signature') {
    buildSignaturePad(card, q.sigKey || 'engineer');

  } else if (q.type === 'customer_sig') {
    const nameInp = document.createElement('input');
    nameInp.type = 'text'; nameInp.className = 'field-input';
    nameInp.placeholder = 'Customer name…'; nameInp.style.marginBottom = '14px';
    if (answers['customer_name']) nameInp.value = answers['customer_name'];
    nameInp.oninput = () => { answers['customer_name'] = nameInp.value; };
    card.appendChild(nameInp);
    buildSignaturePad(card, 'customer');
  }

  if (!['yn', 'yna'].includes(q.type)) {
    const nextBtn = document.createElement('button');
    nextBtn.className = 'next-btn';
    nextBtn.textContent = currentIndex === QUESTIONS.length - 1 ? 'Complete Service ✓' : 'Next →';
    nextBtn.onclick = () => {
      if (inputEl) answers[q.id] = inputEl.value;
      if (q.type === 'photo' && !answers[q.id]) answers[q.id] = [];
      next();
    };
    mainArea.appendChild(nextBtn);
    if (['photo', 'signature', 'customer_sig', 'text', 'comments_sheet'].includes(q.type)) {
      const skip = document.createElement('button');
      skip.className = 'skip-btn'; skip.textContent = 'Skip this step';
      skip.onclick = () => next();
      mainArea.appendChild(skip);
    }
  }

  const draftBtn = document.createElement('button');
  draftBtn.className = 'save-draft-btn'; draftBtn.textContent = '💾 Save draft & close later';
  draftBtn.onclick = () => { if (inputEl) answers[q.id] = inputEl.value; saveDraft(); };
  mainArea.appendChild(draftBtn);
}

function makeBtn(className, text) {
  const btn = document.createElement('button'); btn.className = className; btn.innerHTML = text; return btn;
}

function buildSignaturePad(card, key) {
  const wrap = document.createElement('div'); wrap.className = 'sig-wrap';
  const canvas = document.createElement('canvas'); canvas.className = 'sig-canvas'; canvas.height = 180;
  wrap.appendChild(canvas); card.appendChild(wrap);
  const acts = document.createElement('div'); acts.className = 'sig-actions';
  const clr = document.createElement('button'); clr.className = 'sig-clear'; clr.textContent = 'Clear';
  clr.onclick = () => { const ctx = sigContexts[key]; if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height); answers['sig_' + key] = null; };
  acts.appendChild(clr); card.appendChild(acts);
  requestAnimationFrame(() => {
    canvas.width = canvas.offsetWidth;
    const ctx = canvas.getContext('2d');
    sigContexts[key] = ctx;
    ctx.strokeStyle = '#111827'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    if (answers['sig_' + key]) { const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = answers['sig_' + key]; }
    const getPos = e => {
      const r = canvas.getBoundingClientRect(), s = e.touches ? e.touches[0] : e;
      return { x: (s.clientX - r.left) * (canvas.width / r.width), y: (s.clientY - r.top) * (canvas.height / r.height) };
    };
    canvas.addEventListener('mousedown', e => { sigDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', e => { if (!sigDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    canvas.addEventListener('mouseup', () => { sigDrawing = false; answers['sig_' + key] = canvas.toDataURL(); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); sigDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!sigDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });
    canvas.addEventListener('touchend', () => { sigDrawing = false; answers['sig_' + key] = canvas.toDataURL(); });
  });
}

function next() {
  currentIndex++;
  if (currentIndex >= QUESTIONS.length) showSummary();
  else { renderQuestion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
}

document.getElementById('photo-input').addEventListener('change', function(e) {
  const files = Array.from(e.target.files); if (!files.length) return;
  if (!answers[photoInputTarget]) answers[photoInputTarget] = [];
  const previews = document.getElementById('photo-previews-' + photoInputTarget);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      answers[photoInputTarget].push(ev.target.result);
      if (previews) { const img = document.createElement('img'); img.src = ev.target.result; img.className = 'photo-thumb'; previews.appendChild(img); }
    };
    reader.readAsDataURL(file);
  });
  this.value = '';
});

function showSummary() {
  clearDraft();
  document.getElementById('app-screen').style.display = 'none';
  const sum = document.getElementById('summary-screen');
  sum.style.display = 'flex';
  const dateStr = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  sum.innerHTML = `<div class="summary-header"><div class="tick">✅</div><h2>Service Complete</h2><p>${dateStr}</p></div><div class="section-divider">Site Details</div>`;

  const siteFields = [
    ['Location Ref', siteDetails.locRef], ['Property Name', siteDetails.property],
    ['Address', siteDetails.address], ['Engineer', siteDetails.engineer],
    ['Certificate No', siteDetails.certNo], ['Service Date', siteDetails.date ? new Date(siteDetails.date+'T00:00:00').toLocaleDateString('en-GB') : ''],
    ['Type of Service', siteDetails.serviceType],
  ];
  siteFields.forEach(([label, val]) => {
    if (!val) return;
    const item = document.createElement('div'); item.className = 'summary-item';
    item.innerHTML = `<div class="s-label">${label}</div><div class="s-value">${val}</div>`;
    sum.appendChild(item);
  });

  const div = document.createElement('div'); div.className = 'section-divider'; div.textContent = 'Checklist'; sum.appendChild(div);

  QUESTIONS.forEach(q => {
    const val = q.type === 'signature' ? answers['sig_engineer'] : q.type === 'customer_sig' ? answers['sig_customer'] : answers[q.id];
    if (val === undefined || val === null || val === '') return;
    const item = document.createElement('div'); item.className = 'summary-item';
    let display = '';
    if (q.type === 'photo' && Array.isArray(val)) {
      display = val.map(src => `<img src="${src}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-top:6px;" />`).join('');
    } else if (q.type === 'signature' || q.type === 'customer_sig') {
      const name = q.type === 'customer_sig' ? (answers['customer_name'] ? `<div class="s-value" style="margin-bottom:6px;">${answers['customer_name']}</div>` : '') : '';
      display = name + `<img src="${val}" style="width:100%;background:#fff;border-radius:6px;margin-top:4px;" />`;
    } else if (q.type === 'battery_calc') {
      try { const bc = JSON.parse(val); display = `<div class="s-value">I1=${bc.I1}A  T1=${bc.T1}h  I2=${bc.I2}A  →  Cmin = ${bc.Cmin} Ah</div>`; }
      catch(e) { display = `<div class="s-value">${val}</div>`; }
    } else if (q.type === 'comments_sheet') {
      try {
        const items = JSON.parse(val);
        display = items.map((c, i) => `<div class="s-value" style="margin-bottom:4px;"><strong>${i+1}.</strong> ${c}</div>`).join('');
      } catch(e) { display = `<div class="s-value">${val}</div>`; }
    } else {
      display = `<div class="s-value">${val}</div>`;
    }
    item.innerHTML = `<div class="s-label">${q.label}</div>${display}`;
    sum.appendChild(item);
  });

  const exportBtn = document.createElement('button');
  exportBtn.className = 'export-btn'; exportBtn.textContent = '📄 Save Service Certificate PDF';
  exportBtn.onclick = exportPDF; sum.appendChild(exportBtn);

  const emailBtn = document.createElement('button');
  emailBtn.className = 'email-btn'; emailBtn.textContent = '✉️ Email PDF';
  emailBtn.onclick = emailPDF; sum.appendChild(emailBtn);

  const restartBtn = document.createElement('button');
  restartBtn.className = 'restart-btn'; restartBtn.textContent = '🔄 Start New Service';
  restartBtn.onclick = () => {
    currentIndex = 0; answers = {}; siteDetails = {}; sigContexts = {}; selectedServiceType = '';
    clearDraft();
    document.getElementById('summary-screen').style.display = 'none';
    document.getElementById('site-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('sd-date').value = new Date().toISOString().split('T')[0];
    document.querySelectorAll('#service-type-row .choice-btn').forEach(b => b.classList.remove('selected'));
    window.scrollTo({ top: 0 });
  };
  sum.appendChild(restartBtn);
}

// ── PDF Export ────────────────────────────────────────────────────────────────
const AM = [245,168,0], BK = [0,0,0], WH = [255,255,255], ALT = [247,247,247];
const PM = 12, PW = 210, CW = PW - PM*2, RH = 9;

function cell(doc, x, y, w, h, txt, {fill=WH,bold=false,fs=8,align='left',border=true}={}) {
  doc.setFillColor(...fill);
  if(border){doc.setDrawColor(...BK);doc.setLineWidth(0.3);doc.rect(x,y,w,h,'FD');}else{doc.rect(x,y,w,h,'F');}
  doc.setFont('helvetica',bold?'bold':'normal');doc.setFontSize(fs);doc.setTextColor(...BK);
  const lines=doc.splitTextToSize(String(txt||''),w-4);
  const ty = y + h*0.65;
  if(align==='center') doc.text(lines,x+w/2,ty,{align:'center'});
  else doc.text(lines,x+2,ty);
}

function amberBar(doc, y, h, txt, fs=10) {
  doc.setFillColor(...AM);doc.setDrawColor(...BK);doc.setLineWidth(0.5);
  doc.rect(PM,y,CW,h,'FD');
  doc.setFont('helvetica','bold');doc.setFontSize(fs);doc.setTextColor(...BK);
  doc.text(txt, PM+3, y+h*0.68);
}

function pgHeader(doc) {
  doc.setFillColor(...AM);doc.setDrawColor(...BK);doc.setLineWidth(0.5);
  doc.rect(0,0,PW,20,'FD');
  doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...BK);
  doc.text('Fire Alarm System Servicing Certificate — Ladrillos Facilities Ltd', PM, 13);
}

function siteBlock(doc, y) {
  const hw = CW/2;
  [[['LOCATION REF:',siteDetails.locRef||'',36,hw-36],['DATE:',siteDetails.date?new Date(siteDetails.date+'T00:00:00').toLocaleDateString('en-GB'):'',16,hw-16]],
   [['PROPERTY NAME:',siteDetails.property||'',36,hw-36],['ENGINEER:',siteDetails.engineer||'',20,hw-20]],
   [['ADDRESS:',siteDetails.address||'',20,CW-20],null]]
  .forEach(pair => {
    pair.forEach((item,col) => {
      if(!item) return;
      const [lbl,val,lw,vw]=item;
      const x = col===0 ? PM : PM+hw+2;
      cell(doc,x,y,lw,RH,lbl,{fill:AM,bold:true,fs:7});
      cell(doc,x+lw,y,vw,RH,val,{fs:7});
    });
    y+=RH;
  });
  return y;
}

function chk(doc, y, need=12) {
  if(y+need>280){doc.addPage();pgHeader(doc);return 24;}
  return y;
}

function footerBar(doc, y) {
  y=chk(doc,y,10);
  doc.setFillColor(...AM);doc.setDrawColor(...BK);doc.setLineWidth(0.4);
  doc.rect(PM,y,CW,8,'FD');
  doc.setFont('helvetica','bold');doc.setFontSize(6);doc.setTextColor(...BK);
  doc.text('THIS LOG AND CERTIFICATE IS TO REMAIN WITH THE SITE MAINTENANCE LOG BOOK AND MUST BE AVAILABLE FOR INSPECTION BY AUTHORISED PERSONS.',PM+2,y+5.5);
  return y+8;
}

function pageNums(doc) {
  const n=doc.internal.getNumberOfPages();
  for(let i=1;i<=n;i++){
    doc.setPage(i);doc.setFontSize(7);doc.setTextColor(160,160,160);doc.setFont('helvetica','normal');
    doc.text(`Ladrillos Facilities Ltd  |  Page ${i} of ${n}  |  FAS Cert v3`,PW/2,293,{align:'center'});
  }
}

function getFilename() {
  return `LFL_FireAlarm_${(siteDetails.property||'Site').replace(/\s+/g,'_')}_${siteDetails.date||new Date().toISOString().split('T')[0]}.pdf`;
}

async function buildDoc() {
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-GB') : '';

  // PAGE 1 — Certificate
  pgHeader(doc);
  let y = 22;

  cell(doc,PM,y,40,RH,'Certificate No:',{fill:AM,bold:true,fs:7});
  cell(doc,PM+40,y,CW-40,RH,siteDetails.certNo||'',{fs:7}); y+=RH;
  y = siteBlock(doc, y); y+=2;

  // Certification statement
  const stmt = 'I / we being the competent person(s) responsible (as indicated by my / our signatures below) for the servicing of the fire detection and fire alarm system CERTIFY that the said work complies to the best of my / our knowledge and belief with the recommendations of clause 45 of BS 5839-1:2017 quarterly inspection of vented batteries / periodic inspection and test / inspection and test over a 12 month period (delete as applicable), except for the variations, if any, stated in this certificate.';
  const stLines = doc.setFont('helvetica','normal').setFontSize(7).splitTextToSize(stmt, CW-4);
  const stH = stLines.length * 3.8 + 4;
  doc.setFillColor(...AM);doc.setDrawColor(...BK);doc.setLineWidth(0.3);doc.rect(PM,y,CW,stH,'FD');
  doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(...BK);
  doc.text(stLines, PM+2, y+4); y += stH+2;

  // Extent of system
  cell(doc,PM,y,CW,7,'The extent of liability of the signatory is limited to the system described below. Extent of system covered by this certificate:',{fill:AM,bold:true,fs:6.5}); y+=7;
  doc.setFillColor(...WH);doc.setDrawColor(...BK);doc.setLineWidth(0.3);doc.rect(PM,y,CW,16,'FD'); y+=18;

  // Variations
  cell(doc,PM,y,CW,7,'Variations from the recommendations of clause 45 of BS 5839-1:2017 for periodic or annual inspection and test (as applicable):',{fill:AM,bold:true,fs:6.5}); y+=7;
  doc.setFillColor(...WH);doc.setDrawColor(...BK);doc.rect(PM,y,CW,16,'FD'); y+=18;

  // Logbook row
  cell(doc,PM,y,CW-38,RH,'Relevant details of the work carried out and faults identified have been entered in the system logbook?',{fs:7});
  cell(doc,PM+CW-38,y,38,RH,'YES / NO *  (* Delete)',{bold:true,fs:6.5}); y+=RH;

  // False alarms
  cell(doc,PM,y,CW-52,RH,'Number of false alarms in the last 12 months:',{fill:AM,bold:true,fs:7});
  cell(doc,PM+CW-52,y,12,RH,'(x)',{fs:7,align:'center'});
  cell(doc,PM+CW-40,y,40,RH,'Enter Y for Category M Systems, enter "0" below',{fs:6}); y+=RH;
  cell(doc,PM,y,CW-52,RH,'Number of Automatic Detectors:',{fill:AM,bold:true,fs:7});
  cell(doc,PM+CW-52,y,52,RH,'(y)',{fs:7,align:'center'}); y+=RH;
  cell(doc,PM,y,CW-52,RH,'Number of false alarms per 100 Detectors per Annum (x/y)x100:',{fill:AM,bold:true,fs:7});
  cell(doc,PM+CW-52,y,52,RH,'',{}); y+=RH+2;

  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...BK);
  doc.text('Any Remedial works / actions deemed necessary are detailed on the Comments Sheet', PM, y+4); y+=8;

  // Sig blocks p1
  [['On behalf of the client:',''],['On behalf of Ladrillos Facilities Ltd:',siteDetails.engineer||'']].forEach(([lbl,name]) => {
    y=chk(doc,y,36);
    cell(doc,PM,y,CW,7,lbl,{fill:AM,bold:true,fs:8}); y+=7;
    doc.setFillColor(...WH);doc.setDrawColor(...BK);doc.setLineWidth(0.3);
    doc.rect(PM,y,CW/2-2,14,'FD');doc.rect(PM+CW/2+2,y,CW/2-2,14,'FD'); y+=14;
    cell(doc,PM,y,CW/2-20,RH,'Print Name: '+name,{fs:7});
    cell(doc,PM+CW/2-20,y,20,RH,'',{});
    cell(doc,PM+CW/2+2,y,16,RH,'Date:',{fill:AM,bold:true,fs:7});
    cell(doc,PM+CW/2+18,y,CW/2-16,RH,'',{fs:7}); y+=RH+1;
  });

  y = footerBar(doc, y+2);

  // PAGE 2 — Panel / Checklist
  doc.addPage(); pgHeader(doc); y=22;
  y = siteBlock(doc, y); y+=2;

  // Type of service
  cell(doc,PM,y,CW-66,RH,'TYPE OF SERVICE',{fill:AM,bold:true,fs:8});
  ['Q','B/A','A'].forEach((t,i)=>{
    cell(doc,PM+CW-66+(i*22),y,22,RH,t+(siteDetails.serviceType===t?' ✓':''),{fill:siteDetails.serviceType===t?AM:WH,bold:true,fs:8,align:'center'});
  }); y+=RH+2;

  amberBar(doc,y,8,'GENERAL SYSTEM INFORMATION',9); y+=9;

  const hw = CW/2;
  const pairs = [
    ['Manufacturer:',     answers[1]||'',  'Model:',                          answers[2]||''],
    ['Type of System:',   answers[3]||'',  'Location:',                       answers[4]||''],
    ['Battery Load Test:',answers[5]||'',  'Charging Voltage:',               answers[6]||''],
    ['MCP Manual Call Point', answers[7]||'', 'Panel Controls',               answers[8]||''],
    ['H Heat Detector',   answers[9]||'',  'Circuit Monitoring',              answers[10]||''],
    ['MS Multi Sensor',   answers[11]||'', 'Relays & Shutdowns',              answers[12]||''],
    ['Optical Detector',  answers[13]||'', 'Audibility Test / Visual Devices',answers[14]||''],
    ['Indicator Lights & Fault Buzzer', answers[15]||'', 'Linked to Other Premises', answers[16]||''],
  ];
  pairs.forEach((r,i)=>{
    y=chk(doc,y);
    const bg=i%2===0?ALT:WH, lw=44;
    cell(doc,PM,      y,lw,    RH,r[0],{fill:AM,bold:true,fs:7});
    cell(doc,PM+lw,   y,hw-lw, RH,r[1],{fill:bg,fs:8,bold:!!r[1]});
    cell(doc,PM+hw+1, y,lw,    RH,r[2],{fill:AM,bold:true,fs:7});
    cell(doc,PM+hw+1+lw,y,hw-lw-1,RH,r[3],{fill:bg,fs:8,bold:!!r[3]});
    y+=RH;
  });

  y=chk(doc,y);
  cell(doc,PM,y,44,RH,'Batteries (Qty / Voltage / Ah)',{fill:AM,bold:true,fs:7});
  cell(doc,PM+44,y,CW-44,RH,answers[17]||'',{fs:8,bold:!!(answers[17])}); y+=RH;

  y=chk(doc,y);
  let bcTxt='';
  if(answers[18]){try{const b=JSON.parse(answers[18]);bcTxt=`I1=${b.I1}A   T1=${b.T1}h   I2=${b.I2}A   →   Cmin = ${b.Cmin} Ah`;}catch(e){}}
  cell(doc,PM,y,55,RH,'Cmin = [(I1×T1)+I2] × 1.25',{fill:AM,bold:true,fs:7});
  cell(doc,PM+55,y,CW-55,RH,bcTxt,{fill:[220,255,220],fs:8,bold:!!bcTxt}); y+=RH+2;

  amberBar(doc,y,8,'MONITORING',9); y+=9;
  [
    [19,'1. Is the system monitored via Intruder alarm Central Station?'],
    [20,'2. Central Station Telephone Number:'],
    [21,'3. Central Station has been contacted by Engineer upon completion of testing to restore monitoring?'],
    [22,'4. Fire Alarm Testing operation has been explained to the signatory below?'],
  ].forEach(([id,lbl],i)=>{
    y=chk(doc,y);
    const bg=i%2===0?ALT:WH;
    cell(doc,PM,y,CW-36,RH+1,lbl,{fill:AM,bold:true,fs:7});
    cell(doc,PM+CW-36,y,36,RH+1,answers[id]||'',{fill:bg,fs:9,bold:true,align:'center'});
    y+=RH+1;
  }); y+=2;

  // Overall assessment
  y=chk(doc,y,20);
  const aStmt='I have inspected and tested the Fire Alarm installation at the above premises in accordance with BS 5839 Part 1 and Log Book completed. The overall assessment is:';
  const aLines=doc.setFont('helvetica','normal').setFontSize(7).splitTextToSize(aStmt,CW-4);
  cell(doc,PM,y,CW,aLines.length*3.8+4,aStmt,{fill:AM,fs:7}); y+=aLines.length*3.8+4;
  y=chk(doc,y,10);
  cell(doc,PM,y,CW,10,'SATISFACTORY  /  UNSATISFACTORY  /  WITH OBSERVATIONS    (Delete as appropriate)',{bold:true,fs:9,align:'center'}); y+=13;

  // Sig blocks p2
  [['On behalf of the client:','sig_customer',answers['customer_name']||''],
   ['On behalf of Ladrillos Facilities Ltd:','sig_engineer',siteDetails.engineer||'']]
  .forEach(([lbl,sigKey,name])=>{
    y=chk(doc,y,36);
    cell(doc,PM,y,CW,7,lbl,{fill:AM,bold:true,fs:8}); y+=7;
    doc.setFillColor(...WH);doc.setDrawColor(...BK);doc.setLineWidth(0.3);
    if(answers[sigKey]){try{doc.addImage(answers[sigKey],'PNG',PM,y,70,20);}catch(e){}}
    doc.rect(PM,y,CW/2-2,20,'D');doc.rect(PM+CW/2+2,y,CW/2-2,20,'D'); y+=20;
    cell(doc,PM,y,CW/2-18,RH,'Print Name: '+name,{fs:7});
    cell(doc,PM+CW/2-18,y,18,RH,'',{});
    cell(doc,PM+CW/2+2,y,16,RH,'Date:',{fill:AM,bold:true,fs:7});
    cell(doc,PM+CW/2+18,y,CW/2-16,RH,fmtDate(siteDetails.date),{fs:7}); y+=RH+1;
  });

  // Photos
  const photoQs=QUESTIONS.filter(q=>q.type==='photo');
  if(photoQs.some(q=>answers[q.id]?.length)){
    y=chk(doc,y,14); amberBar(doc,y,8,'PHOTOS',9); y+=10;
    for(const q of photoQs){
      if(!answers[q.id]?.length) continue;
      for(const src of answers[q.id]){
        y=chk(doc,y,58);
        try{doc.addImage(src,'JPEG',PM,y,80,55);y+=58;}catch(e){}
      }
    }
  }

  y = footerBar(doc, y+2);
  doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
  doc.text('FAS Cert v3 Dec 2018', PW-PM, y+4, {align:'right'});

  // PAGE 3 — Comments Sheet
  doc.addPage(); pgHeader(doc); y=22;
  [['Property Name:',siteDetails.property||''],['Date:',fmtDate(siteDetails.date)],['Engineer:',siteDetails.engineer||'']]
  .forEach(([lbl,val])=>{
    cell(doc,PM,y,36,RH,lbl,{fill:AM,bold:true,fs:7});
    cell(doc,PM+36,y,CW-36,RH,val,{fs:7}); y+=RH;
  }); y+=3;

  amberBar(doc,y,9,'COMMENTS / RECOMMENDATIONS / OBSERVATIONS',10); y+=10;
  cell(doc,PM,y,10,8,'No.',{fill:AM,bold:true,fs:7,align:'center'});
  cell(doc,PM+10,y,CW-10,8,'Comment / Recommendation / Observation',{fill:AM,bold:true,fs:7}); y+=8;

  const cList=(()=>{try{return answers[27]?JSON.parse(answers[27]):[];}catch(e){return[];}})();
  for(let i=1;i<=25;i++){
    y=chk(doc,y,9);
    const txt=cList[i-1]||'', bg=i%2===0?ALT:WH;
    cell(doc,PM,y,10,9,String(i),{fill:bg,bold:true,fs:7,align:'center'});
    cell(doc,PM+10,y,CW-10,9,txt,{fill:bg,fs:7}); y+=9;
  }

  y = footerBar(doc, y+4);
  doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
  doc.text('FAS Cert v3 Dec 2018', PW-PM, y+4, {align:'right'});

  pageNums(doc);
  return doc;
}

async function exportPDF() {
  try {
    const doc = await buildDoc();
    doc.save(getFilename());
  } catch(e) { alert('PDF error: ' + e.message); }
}

async function emailPDF() {
  try {
    const doc = await buildDoc();
    const blob = doc.output('blob');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = getFilename(); a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch(e) { alert('Export error: ' + e.message); }
}
</script>
